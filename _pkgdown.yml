url: https://k5cents.github.io/ifc/
template:
  bootstrap: 5
logo: man/figures/logo.png

reference:
  - title: IFC dates
    desc: Construct and work with `ifc_date` vectors.
    contents:
      - ifc_date
      - ifc_ymd
      - ifc_year_day
      - ifc_leap_day
      - ifc_today
      - ifc_accessors
      - format.ifc_date
      - ifc_coerce

  - title: IFC datetimes
    desc: Construct and work with `ifc_datetime` vectors (date + time + timezone).
    contents:
      - ifc_datetime
      - ifc_now
      - ifc_datetime_accessors
      - format.ifc_datetime
      - ifc_datetime_coerce

  - title: Parse
    desc: Parse IFC-formatted strings back to `ifc_date`.
    contents:
      - ifc_parse

  - title: Sequences and arithmetic
    desc: Generate sequences and perform calendar arithmetic on IFC dates.
    contents:
      - ifc_seq
      - ifc_add
      - ifc_interval
      - "/.ifc_interval"

  - title: Rounding
    desc: Round IFC dates to the nearest week, month, or year boundary.
    contents:
      - ifc_round

  - title: Constants
    desc: IFC month and weekday name vectors.
    contents:
      - IFC_MONTH_NAMES
      - IFC_MONTH_ABBR
      - IFC_WDAY_NAMES
      - IFC_WDAY_ABBR
